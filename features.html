function b64d(s){return Uint8Array.from(atob(s),c=>c.charCodeAt(0))}
async function decrypt(){
  const pwd=document.getElementById("pwd").value;
  if(!pwd)return;
  try{
    const enc=new TextEncoder();const salt=b64d(SALT);const iv=b64d(IV);const ct=b64d(CT);
    const keyMaterial=await crypto.subtle.importKey("raw",enc.encode(pwd),"PBKDF2",false,["deriveBits","deriveKey"]);
    const key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:salt,iterations:100000,hash:"SHA-256"},keyMaterial,{name:"AES-GCM",length:256},false,["decrypt"]);
    const decrypted=await crypto.subtle.decrypt({name:"AES-GCM",iv:iv},key,ct);
    const html=new TextDecoder().decode(decrypted);
    document.open();document.write(html);document.close();
  }catch(e){document.getElementById("err").style.display="block"}
}
document.getElementById("pwd").addEventListener("keydown",e=>{if(e.key==="Enter")decrypt()});
</script></body></html>
