<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Защищённая страница</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f2f5;display:flex;align-items:center;justify-content:center;min-height:100vh}
.lock-card{background:#fff;border-radius:16px;padding:48px 40px;box-shadow:0 4px 24px rgba(0,0,0,.08);text-align:center;max-width:380px;width:90%}
.lock-icon{font-size:48px;margin-bottom:16px}
.lock-card h2{font-size:20px;color:#1a1a2e;margin-bottom:8px}
.lock-card p{font-size:14px;color:#666;margin-bottom:24px}
input[type=password]{width:100%;padding:12px 16px;border:2px solid #e0e0e0;border-radius:10px;font-size:16px;outline:none;transition:border .2s}
input[type=password]:focus{border-color:#4361ee}
.btn{width:100%;margin-top:12px;padding:12px;background:#4361ee;color:#fff;border:none;border-radius:10px;font-size:16px;cursor:pointer;transition:background .2s}
.btn:hover{background:#3a56d4}
.error{color:#e63946;font-size:13px;margin-top:8px;display:none}
</style>
</head>
<body>
<div class="lock-card">
<div class="lock-icon">🔒</div>
<h2>Доступ защищён</h2>
<p>Введите пароль для просмотра</p>
<input type="password" id="pw" placeholder="Пароль" autofocus onkeydown="if(event.key==='Enter')decrypt()">
<button class="btn" onclick="decrypt()">Открыть</button>
<div class="error" id="err">Неверный пароль</div>
</div>

async function decrypt(){
  const pw=document.getElementById("pw").value;
  if(!pw)return;
  try{
    const enc=new TextEncoder();
    const salt=Uint8Array.from(atob(SALT),c=>c.charCodeAt(0));
    const iv=Uint8Array.from(atob(IV),c=>c.charCodeAt(0));
    const ct=Uint8Array.from(atob(CT),c=>c.charCodeAt(0));
    const keyMaterial=await crypto.subtle.importKey("raw",enc.encode(pw),"PBKDF2",false,["deriveKey"]);
    const key=await crypto.subtle.deriveKey({name:"PBKDF2",salt,iterations:100000,hash:"SHA-256"},keyMaterial,{name:"AES-GCM",length:256},false,["decrypt"]);
    const decrypted=await crypto.subtle.decrypt({name:"AES-GCM",iv},key,ct);
    const html=new TextDecoder().decode(decrypted);
    document.open();document.write(html);document.close();
  }catch(e){
    document.getElementById("err").style.display="block";
  }
}
</script>
